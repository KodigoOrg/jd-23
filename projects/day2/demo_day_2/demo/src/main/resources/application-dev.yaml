# =====================================================================
# PERFIL: dev
# Uso recomendado: desarrollo local y pruebas manuales.
# =====================================================================
spring:
  datasource:
    # Dev usa H2 en memoria para levantar rapido sin dependencias externas.
    # MODE=PostgreSQL reduce diferencias de sintaxis en desarrollo.
    url: jdbc:h2:mem:productos_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      # Consola web de H2 disponible solo en dev.
      enabled: true
      path: /h2-console

  jpa:
    # En dev permitimos update para iterar rapido con entidades.
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
