# =====================================================================
# Configuracion GLOBAL (aplica a todos los perfiles).
# Los perfiles especificos viven en:
#   - application-dev.yaml
#   - application-prod.yaml
#   - application-testing.yaml
# =====================================================================
spring:
  application:
    name: productos-api
  profiles:
    # Si no se especifica profile al arrancar, se usa "dev".
    # Ejemplo: java -jar app.jar --spring.profiles.active=prod
    default: dev

server:
  port: 8080
