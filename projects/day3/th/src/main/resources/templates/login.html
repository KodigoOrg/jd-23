<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- section: head -->
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chat — Login</title>
    <style>
        /* Reset and base */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* section: card container */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* section: header / logo area */
        .card__icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .card__title {
            color: #e2e8f0;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .card__subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }

        /* section: form elements */
        .form__input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 1rem;
        }

        .form__input::placeholder { color: #64748b; }

        .form__input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }

        /* section: submit button */
        .form__btn {
            width: 100%;
            padding: 0.75rem;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s, transform 0.1s;
        }

        .form__btn:hover:not(:disabled) {
            background: #4f46e5;
            transform: translateY(-1px);
        }

        .form__btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<!-- section: login card -->
<div class="card">

    <!-- section: header -->
    <div class="card__icon">&#128172;</div>
    <h1 class="card__title">Live Chat</h1>
    <p class="card__subtitle">Enter your name to join the conversation</p>

    <!-- section: login form -->
    <!--
        POST /login — handled by LoginController.login().
        The username parameter is validated server-side as well.
    -->
    <form th:action="@{/login}" method="post" id="loginForm">
        <input
            type="text"
            id="usernameInput"
            name="username"
            class="form__input"
            placeholder="Enter your name"
            maxlength="64"
            autocomplete="off"
            autofocus
        />
        <button type="submit" id="submitBtn" class="form__btn" disabled>
            Enter chat
        </button>
    </form>

</div>

<!-- section: client-side validation script -->
<script>
    /*
     * Disable the submit button while the input is empty.
     * This prevents accidental submissions with a blank username.
     * Server-side validation in LoginController acts as a second guard.
     */
    const input = document.getElementById('usernameInput');
    const btn   = document.getElementById('submitBtn');

    function toggleBtn() {
        btn.disabled = input.value.trim().length === 0;
    }

    // Evaluate on every keystroke and on paste events.
    input.addEventListener('input', toggleBtn);
    input.addEventListener('paste', () => setTimeout(toggleBtn, 0));

    // Also allow submitting with the Enter key (default form behaviour already
    // handles this, but we keep the button state in sync).
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && input.value.trim().length === 0) {
            e.preventDefault();
        }
    });
</script>

</body>
</html>
