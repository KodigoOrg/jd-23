<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: base(title='Chat — Login', css='/css/login.css')}"/>
</head>
<body>

<!-- ── Login card ─────────────────────────────────────────────────────────── -->
<div class="card">

    <div class="card__icon">&#128172;</div>
    <h1 class="card__title">Live Chat</h1>
    <p class="card__subtitle">Enter your name to join the conversation</p>

    <!--
        POST /login — handled by LoginController.login().
        Username is also validated server-side.
    -->
    <form th:action="@{/login}" method="post" id="loginForm">
        <input
            type="text"
            id="usernameInput"
            name="username"
            class="form__input"
            placeholder="Enter your name"
            maxlength="64"
            autocomplete="off"
            autofocus
        />
        <button type="submit" id="submitBtn" class="form__btn" disabled>
            Enter chat
        </button>
    </form>

</div>

<script th:src="@{/js/login.js}"></script>

</body>
</html>
