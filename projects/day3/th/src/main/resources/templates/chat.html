<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: base(title='Live Chat', css='/css/chat.css')}"/>
    <!-- SockJS and STOMP must load before chat.js -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header class="header">
    <span class="header__icon">&#128172;</span>
    <span class="header__title">Live Chat</span>
    <span class="header__user">
        Logged in as <span class="header__badge" th:text="${username}">User</span>
    </span>

    <!--
        Logout uses POST to avoid accidental logouts from link prefetch.
        The JS in chat.js sends a LEAVE event before submitting the form.
    -->
    <form th:action="@{/logout}" method="post" id="logoutForm" style="margin:0">
        <button type="button" class="header__logout" id="logoutBtn">&#x2190; Leave</button>
    </form>
</header>

<!-- ── Message list ───────────────────────────────────────────────────────── -->
<div class="messages" id="messageArea">
    <!-- Populated dynamically by chat.js -->
</div>

<!-- ── Input bar ──────────────────────────────────────────────────────────── -->
<div class="input-bar">
    <input
        type="text"
        id="messageInput"
        class="input-bar__field"
        placeholder="Type a message..."
        maxlength="2048"
        autocomplete="off"
    />
    <button id="sendBtn" class="input-bar__btn" disabled>Send</button>
</div>

<!--
    Expose the server-side username to chat.js as window.CURRENT_USER.
    Thymeleaf inlines the value at render time; the external script reads it.
-->
<script th:inline="javascript">
    window.CURRENT_USER = /*[[${username}]]*/ 'Anonymous';
</script>
<script th:src="@{/js/chat.js}"></script>

</body>
</html>
